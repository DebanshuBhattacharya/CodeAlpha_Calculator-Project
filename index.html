<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Calculator with Side History</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <section class="calculator-main">
        <div class="top-bar">
          <span class="app-title">Pro Calc</span>
          <button class="theme-toggle" id="theme-btn">☀️ Light</button>
        </div>

        <div class="display">
          <div class="previous-operand" id="previous-operand"></div>
          <div class="current-operand" id="current-operand">0</div>
        </div>

        <div class="buttons-grid">
          <button class="btn-special" id="ac-btn">AC</button>
          <button class="btn-special" id="del-btn">DEL</button>
          <button class="btn-func" data-action="%" title="Percentage">%</button>
          <button class="btn-operator" data-action="÷">÷</button>

          <button class="btn-func" data-action="√" title="Square Root">
            √
          </button>
          <button class="btn-func" data-action="x²" title="Square">x²</button>
          <button class="btn-func" data-action="+/-" title="Toggle Sign">
            +/−
          </button>
          <button class="btn-operator" data-action="×">×</button>

          <button class="btn-num" data-num="7">7</button>
          <button class="btn-num" data-num="8">8</button>
          <button class="btn-num" data-num="9">9</button>
          <button class="btn-operator" data-action="-">−</button>

          <button class="btn-num" data-num="4">4</button>
          <button class="btn-num" data-num="5">5</button>
          <button class="btn-num" data-num="6">6</button>
          <button class="btn-operator" data-action="+">+</button>

          <button class="btn-num" data-num="1">1</button>
          <button class="btn-num" data-num="2">2</button>
          <button class="btn-num" data-num="3">3</button>
          <button class="btn-equals span-2-row" id="equals-btn">=</button>

          <button class="btn-num span-2-col" data-num="0">0</button>
          <button class="btn-num" data-num=".">.</button>
        </div>
      </section>

      <aside class="history-sidebar">
        <div class="history-header">
          <span class="history-title">History Log</span>
          <button class="clear-history-btn" id="clear-history-btn">
            Clear
          </button>
        </div>
        <div class="history-list" id="history-list">
          <div class="empty-history" id="empty-msg">No calculations yet</div>
        </div>
      </aside>
    </main>
    <script src="script.js"></script>
  </body>
</html>
